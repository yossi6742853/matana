<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#b8860b">
<title>מתנה ל-32 שנים · משפחת שניידר</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #b8860b;
    --gold-light: #d4a017;
    --gold-pale: #fff8e1;
    --cream: #fdf6e3;
    --ink: #2c1810;
    --ink-soft: #5a4a3c;
  }
  * { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Assistant', 'Heebo', sans-serif;
    background: var(--cream);
    color: var(--ink);
    margin: 0;
    min-height: 100vh;
    line-height: 1.6;
  }
  h1, h2, h3, h4 { font-family: 'Frank Ruhl Libre', serif; letter-spacing: -0.02em; }

  /* Hero */
  .hero {
    background:
      radial-gradient(circle at 30% 20%, rgba(255,215,100,.25), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(184,134,11,.3), transparent 50%),
      linear-gradient(135deg, #1a1410 0%, #2c1810 100%);
    color: white;
    padding: 50px 20px 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '✦';
    position: absolute;
    top: 30px;
    right: 30px;
    font-size: 2rem;
    color: var(--gold-light);
    opacity: 0.3;
  }
  .hero::after {
    content: '✦';
    position: absolute;
    bottom: 30px;
    left: 30px;
    font-size: 2rem;
    color: var(--gold-light);
    opacity: 0.3;
  }
  .hero .anniv {
    font-size: 0.95rem;
    color: var(--gold-light);
    letter-spacing: 0.4em;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .hero h1 {
    font-size: 2.8rem;
    font-weight: 900;
    margin: 8px 0 12px;
    background: linear-gradient(135deg, #fff8e1, #d4a017);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .sub {
    font-size: 1.05rem;
    color: #d4af7a;
    font-family: 'Assistant', sans-serif;
    font-weight: 400;
  }
  .hero .heart {
    display: inline-block;
    color: #ff6b6b;
    animation: beat 1.5s ease-in-out infinite;
  }
  @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  /* Product card */
  .product-section { margin-top: -50px; padding: 0 16px; }
  .product-card {
    background: white;
    border-radius: 24px;
    padding: 0;
    box-shadow: 0 20px 60px rgba(44, 24, 16, 0.15);
    max-width: 720px;
    margin: 0 auto;
    overflow: hidden;
  }
  .product-image {
    width: 100%;
    height: 280px;
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .product-image-label {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255, 255, 255, 0.95);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--gold);
    backdrop-filter: blur(10px);
  }
  .product-info { padding: 24px; }
  .product-name {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .product-desc {
    color: var(--ink-soft);
    font-size: 0.95rem;
    margin-bottom: 16px;
  }
  .product-link {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .product-link:hover { color: var(--gold-light); }

  /* Progress section */
  .progress-section { padding: 30px 16px; max-width: 720px; margin: 0 auto; }
  .progress-card {
    background: linear-gradient(135deg, white 0%, #fffbf2 100%);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 8px 40px rgba(44, 24, 16, 0.08);
    text-align: center;
  }
  .progress-label {
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 0.75rem;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .progress-goal {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 4px;
    letter-spacing: -0.03em;
  }
  .progress-goal .currency { font-size: 1.8rem; vertical-align: top; }
  .progress {
    height: 18px;
    border-radius: 12px;
    background: var(--gold-pale);
    margin: 22px 0;
    overflow: hidden;
  }
  .progress-bar {
    background: linear-gradient(90deg, #ffd700, var(--gold-light), var(--gold));
    height: 100%;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-left: 10px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }
  .stat-box {
    padding: 12px 8px;
    background: white;
    border-radius: 14px;
    border: 1px solid #f0e0c0;
  }
  .stat-num {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--ink-soft);
    margin-top: 4px;
    font-weight: 500;
  }

  /* Pledges list */
  .pledges-section { padding: 0 16px 30px; max-width: 720px; margin: 0 auto; }
  .section-title {
    font-size: 1.3rem;
    font-weight: 800;
    margin: 30px 0 16px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pledge-card {
    background: white;
    border-radius: 18px;
    padding: 16px 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(44, 24, 16, 0.06);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
    border-right: 4px solid transparent;
  }
  .pledge-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44, 24, 16, 0.1); }
  .pledge-card.paid { border-right-color: #28a745; background: linear-gradient(135deg, white, #f0fdf4); }
  .pledge-card.pending { border-right-color: var(--gold); background: linear-gradient(135deg, white, #fffbf2); }
  .pledge-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .pledge-info { flex: 1; min-width: 0; }
  .pledge-name { font-size: 1.05rem; font-weight: 700; color: var(--ink); }
  .pledge-meta { font-size: 0.8rem; color: var(--ink-soft); margin-top: 2px; }
  .pledge-note { font-size: 0.82rem; color: var(--ink-soft); margin-top: 6px; font-style: italic; }
  .pledge-amount {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .pledge-amount .currency { font-size: 1rem; }

  /* Empty state for hidden names */
  .pledge-anonymous {
    background: var(--gold-pale);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 12px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.9rem;
  }

  /* Big pledge button */
  .pledge-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: white;
    font-weight: 800;
    padding: 14px 32px;
    border-radius: 100px;
    border: none;
    font-size: 1.05rem;
    box-shadow: 0 8px 30px rgba(184, 134, 11, 0.4);
    z-index: 100;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pledge-btn:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 35px rgba(184, 134, 11, 0.5); }
  .pledge-btn:active { transform: translateX(-50%) translateY(0); }

  /* Modal */
  .modal-content {
    border-radius: 20px;
    border: none;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  }
  .modal-header {
    background: linear-gradient(135deg, var(--gold), #8b6914);
    color: white;
    border-bottom: none;
    border-radius: 20px 20px 0 0;
  }
  .modal-title { font-family: 'Frank Ruhl Libre', serif; font-weight: 700; }
  .form-control, .form-select {
    border-radius: 12px;
    border: 1.5px solid #f0e0c0;
    padding: 12px 16px;
    font-size: 1rem;
  }
  .form-control:focus, .form-select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(184, 134, 11, 0.1);
  }
  .form-label { font-weight: 600; color: var(--ink); }

  /* Sync indicator */
  .sync-indicator {
    position: fixed;
    bottom: 90px;
    left: 20px;
    background: white;
    padding: 6px 14px;
    border-radius: 100px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 90;
  }
  .sync-indicator.idle { color: #28a745; }
  .sync-indicator.syncing { color: #0d6efd; }
  .sync-indicator.error { color: #dc3545; }

  /* Confetti */
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

  /* Footer */
  .footer-note {
    text-align: center;
    padding: 30px 20px 100px;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }
  .footer-note .symbol { color: var(--gold); margin: 0 6px; }

  @media (max-width: 640px) {
    .hero { padding: 36px 20px 70px; }
    .hero h1 { font-size: 2.2rem; }
    .progress-goal { font-size: 2.8rem; }
    .stat-num { font-size: 1.2rem; }
    .pledge-amount { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="anniv">32 שנים · ל"ב באהבה</div>
  <h1>מתנה לאבא ואמא</h1>
  <div class="sub">משפחת שניידר <span class="heart">💝</span> יחד</div>
</div>

<div class="product-section">
  <div class="product-card">
    <div class="product-image" id="productImage" style="background-image: url('https://www.payngo.co.il/cdn-cgi/image/format=auto,metadata=none,quality=90,width=700,height=700/media/catalog/product/2/9/2988807.png');">
      <div class="product-image-label">🍳 המתנה</div>
    </div>
    <div class="product-info">
      <div class="product-name">אי למטבח</div>
      <div class="product-desc">בדיוק מה שאמא רוצה</div>
      <a class="product-link" href="https://www.payngo.co.il/298880.html" target="_blank">
        <i class="bi bi-link-45deg"></i> צפייה במוצר ב-Pay&Go
      </a>
    </div>
  </div>
</div>

<div class="progress-section">
  <div class="progress-card">
    <div class="progress-label">היעד</div>
    <div class="progress-goal"><span class="currency">₪</span><span id="goalAmount">2175</span></div>
    <div class="progress">
      <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
    </div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" id="totalRaised">₪0</div>
        <div class="stat-label">נאסף</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="totalRemaining">₪2175</div>
        <div class="stat-label">חסר</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="participantsCount">0</div>
        <div class="stat-label">השתתפו</div>
      </div>
    </div>
  </div>
</div>

<div class="pledges-section">
  <div class="section-title">
    <i class="bi bi-stars"></i> הצטרפו עד כה
  </div>
  <div id="pledgesList"></div>
</div>

<button class="pledge-btn" onclick="openPledgeModal()">
  <i class="bi bi-plus-circle-fill"></i> עדכן את ההתחייבות שלי
</button>

<!-- Pledge Modal -->
<div class="modal fade" id="pledgeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">💝 עדכון התחייבות</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">מי אני?</label>
          <select id="pledgeName" class="form-select form-select-lg"></select>
        </div>
        <div class="mb-3">
          <label class="form-label">כמה אני מתחייב/ת?</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text">₪</span>
            <input type="number" id="pledgeAmount" class="form-control" min="0" step="10" placeholder="לדוגמה: 250">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">סטטוס תשלום</label>
          <select id="pledgeStatus" class="form-select">
            <option value="pending">התחייבתי - עוד לא העברתי</option>
            <option value="paid">כבר העברתי 🎉</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">הערה (אופציונלי)</label>
          <input type="text" id="pledgeNote" class="form-control" placeholder="לדוגמה: אעביר ביום ראשון">
        </div>
      </div>
      <div class="modal-footer">
        <button class="pledge-btn" style="position:static;transform:none;" onclick="savePledge()">
          <i class="bi bi-check2-circle"></i> שמור
        </button>
      </div>
    </div>
  </div>
</div>

<div class="sync-indicator idle" id="syncStatus">
  <i class="bi bi-cloud-check"></i> <span id="syncText">מסונכרן</span>
</div>

<div class="footer-note">
  <span class="symbol">✦</span> כל שקל יתקבל בברכה <span class="symbol">✦</span><br>
  רחלי תרכז את ההעברות
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
